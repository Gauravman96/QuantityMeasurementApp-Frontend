# Netlify Configuration for Angular (Static Build)

[build]
  command = "npm run build:netlify"
  publish = "dist/qm-frontend"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

# Angular SPA Routing Fix
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Basic Caching (safe defaults)
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"