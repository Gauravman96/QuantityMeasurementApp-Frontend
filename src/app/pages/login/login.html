
<div class="login-card">

    <h2>Quantity Measurement App</h2>
    <p class="subtitle">Sign in to your account</p>

    <div class="form-group">
        <label>Username</label>
        <input [(ngModel)]="username" placeholder="Enter your username" />
    </div>

    <div class="form-group">
        <label>Password</label>
        <input [(ngModel)]="password" type="password" placeholder="Enter your password" />
    </div>

    <button class="btn-primary" (click)="login()">Sign In</button>

    <div class="divider">or</div>

    <button class="btn-google" (click)="googleLogin()">
        <svg class="google-icon" viewBox="0 0 48 48">
            <path fill="#EA4335"
                d="M24 9.5c3.1 0 5.6 1.1 7.6 2.9l5.6-5.6C33.6 3.5 29.1 1.5 24 1.5 14.9 1.5 7.2 7.1 4 15l6.6 5.1C12.3 13.7 17.7 9.5 24 9.5z" />
            <path fill="#4285F4"
                d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.8-9.9 6.8-16.9z" />
            <path fill="#FBBC05"
                d="M10.6 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6L3.7 14.3A22.5 22.5 0 0 0 1.5 24c0 3.6.9 7 2.4 10l6.7-5.4z" />
            <path fill="#34A853"
                d="M24 46.5c5.1 0 9.4-1.7 12.5-4.6l-7.4-5.7c-1.7 1.1-3.8 1.8-6.1 1.8-6.3 0-11.6-4.2-13.4-10l-6.6 5.1C7.2 40.9 14.9 46.5 24 46.5z" />
        </svg>
        Continue with Google
    </button>

    <div class="signup-link">
        Don't have an account? <a routerLink="/signup">Sign up</a>
    </div>

</div>
